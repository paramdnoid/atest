# Production / staging single-server compose
#
# Usage:
#   cp .env.example .env.production   # fill in production values
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.production up -d --build

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: zunftgewerk
      POSTGRES_USER: zunftgewerk
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zunftgewerk']
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: jdbc:postgresql://postgres:5432/zunftgewerk
      DATABASE_USERNAME: zunftgewerk
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # gRPC
      GRPC_PORT: ${GRPC_PORT:-9090}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # Auth cookies
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-None}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_COOKIE_PATH: ${AUTH_COOKIE_PATH:-/}
      AUTH_COOKIE_MAX_AGE_SECONDS: ${AUTH_COOKIE_MAX_AGE_SECONDS:-2592000}
      # JWT
      JWT_ISSUER: ${JWT_ISSUER:-zunftgewerk}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-zunftgewerk-clients}
      JWT_KID: ${JWT_KID:-prod-key-1}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_MFA_TTL_SECONDS: ${JWT_MFA_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
      JWT_PUBLIC_KEY_PEM: ${JWT_PUBLIC_KEY_PEM}
      # MFA
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      # Passkey/WebAuthn
      PASSKEY_RP_ID: ${PASSKEY_RP_ID}
      PASSKEY_RP_NAME: ${PASSKEY_RP_NAME:-Zunftgewerk}
      PASSKEY_ORIGIN: ${PASSKEY_ORIGIN}
      # Rate limiting
      AUTH_RATE_LIMIT_ENABLED: ${AUTH_RATE_LIMIT_ENABLED:-true}
      AUTH_RATE_LIMIT_LOGIN_LIMIT: ${AUTH_RATE_LIMIT_LOGIN_LIMIT:-5}
      AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:-60}
      AUTH_RATE_LIMIT_PASSKEY_LIMIT: ${AUTH_RATE_LIMIT_PASSKEY_LIMIT:-10}
      AUTH_RATE_LIMIT_PASSKEY_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_PASSKEY_WINDOW_SECONDS:-60}
      AUTH_RATE_LIMIT_MFA_LIMIT: ${AUTH_RATE_LIMIT_MFA_LIMIT:-10}
      AUTH_RATE_LIMIT_MFA_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_MFA_WINDOW_SECONDS:-300}
      AUTH_RATE_LIMIT_REFRESH_LIMIT: ${AUTH_RATE_LIMIT_REFRESH_LIMIT:-30}
      AUTH_RATE_LIMIT_REFRESH_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_REFRESH_WINDOW_SECONDS:-60}
      # Feature flags
      FEATURE_MFA_ENFORCEMENT_ADMIN: ${FEATURE_MFA_ENFORCEMENT_ADMIN:-true}
      FEATURE_STRIPE_BILLING: ${FEATURE_STRIPE_BILLING:-true}
      FEATURE_PASSKEY_AUTH: ${FEATURE_PASSKEY_AUTH:-true}
      FEATURE_AUTH_V2_ENABLED: ${FEATURE_AUTH_V2_ENABLED:-true}
      FEATURE_SYNC_ENGINE_V1: ${FEATURE_SYNC_ENGINE_V1:-true}
      FEATURE_CUSTOM_ROLES: ${FEATURE_CUSTOM_ROLES:-true}
      FEATURE_STRIPE_WEBHOOK_ENABLED: ${FEATURE_STRIPE_WEBHOOK_ENABLED:-true}
      FEATURE_SYNC_VECTOR_RESOLVER_ENABLED: ${FEATURE_SYNC_VECTOR_RESOLVER_ENABLED:-true}
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      MAIL_FROM: ${MAIL_FROM:-noreply@zunftgewerk.de}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-ZunftGewerk}
      # Email links
      LANDING_BASE_URL: ${LANDING_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      # Email TTLs
      EMAIL_VERIFICATION_TTL_SECONDS: ${EMAIL_VERIFICATION_TTL_SECONDS:-86400}
      PASSWORD_RESET_TTL_SECONDS: ${PASSWORD_RESET_TTL_SECONDS:-3600}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_STARTER_MONTHLY: ${STRIPE_PRICE_STARTER_MONTHLY:-}
      STRIPE_PRICE_STARTER_YEARLY: ${STRIPE_PRICE_STARTER_YEARLY:-}
      STRIPE_PRICE_PROFESSIONAL_MONTHLY: ${STRIPE_PRICE_PROFESSIONAL_MONTHLY:-}
      STRIPE_PRICE_PROFESSIONAL_YEARLY: ${STRIPE_PRICE_PROFESSIONAL_YEARLY:-}
      STRIPE_RETRY_WORKER_ENABLED: ${STRIPE_RETRY_WORKER_ENABLED:-true}
      STRIPE_RETRY_SCAN_INTERVAL_SECONDS: ${STRIPE_RETRY_SCAN_INTERVAL_SECONDS:-30}
      STRIPE_RETRY_BATCH_SIZE: ${STRIPE_RETRY_BATCH_SIZE:-50}
      STRIPE_RETRY_MAX_ATTEMPTS: ${STRIPE_RETRY_MAX_ATTEMPTS:-5}
      STRIPE_RETRY_BASE_DELAY_SECONDS: ${STRIPE_RETRY_BASE_DELAY_SECONDS:-30}
      STRIPE_RETRY_MAX_DELAY_SECONDS: ${STRIPE_RETRY_MAX_DELAY_SECONDS:-3600}
      STRIPE_INGEST_WORKER_ENABLED: ${STRIPE_INGEST_WORKER_ENABLED:-true}
      STRIPE_INGEST_SCAN_INTERVAL_SECONDS: ${STRIPE_INGEST_SCAN_INTERVAL_SECONDS:-5}
      STRIPE_INGEST_BATCH_SIZE: ${STRIPE_INGEST_BATCH_SIZE:-50}
      STRIPE_DEAD_LETTER_RECOVERY_ENABLED: ${STRIPE_DEAD_LETTER_RECOVERY_ENABLED:-true}
      STRIPE_DEAD_LETTER_RECOVERY_INTERVAL_SECONDS: ${STRIPE_DEAD_LETTER_RECOVERY_INTERVAL_SECONDS:-300}
      STRIPE_DEAD_LETTER_COOLDOWN_SECONDS: ${STRIPE_DEAD_LETTER_COOLDOWN_SECONDS:-3600}
      STRIPE_DEAD_LETTER_MAX_RECOVERY_ATTEMPTS: ${STRIPE_DEAD_LETTER_MAX_RECOVERY_ATTEMPTS:-3}
      STRIPE_OPS_RECOVERY_TOKEN: ${STRIPE_OPS_RECOVERY_TOKEN}
      # Observability
      ENVIRONMENT: production
      OTEL_TRACING_ENABLED: ${OTEL_TRACING_ENABLED:-false}
      OTEL_SAMPLING_PROBABILITY: ${OTEL_SAMPLING_PROBABILITY:-0.1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      # Ops
      INTERNAL_OPS_TOKEN: ${INTERNAL_OPS_TOKEN}
    ports:
      - '127.0.0.1:8080:8080'
      - '127.0.0.1:9090:9090'

  landing:
    build:
      context: ..
      dockerfile: infra/Dockerfile.landing
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    depends_on:
      - api
    ports:
      - '127.0.0.1:3000:3000'

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: always
    depends_on:
      - api
    ports:
      - '127.0.0.1:3001:3001'

volumes:
  pg_data:
  redis_data:

version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: zunftgewerk-postgres
    environment:
      POSTGRES_DB: zunftgewerk
      POSTGRES_USER: zunftgewerk
      POSTGRES_PASSWORD: zunftgewerk
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zunftgewerk-redis
    ports:
      - '6379:6379'

volumes:
  pg_data:

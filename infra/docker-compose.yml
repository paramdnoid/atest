services:
  postgres:
    image: postgres:16
    container_name: zunftgewerk-postgres
    environment:
      POSTGRES_DB: zunftgewerk
      POSTGRES_USER: zunftgewerk
      POSTGRES_PASSWORD: zunftgewerk
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zunftgewerk-redis
    ports:
      - '6379:6379'

  mailpit:
    image: axllent/mailpit
    container_name: zunftgewerk-mailpit
    ports:
      - '1025:1025'   # SMTP (no auth/TLS)
      - '8025:8025'   # Web UI → http://localhost:8025

volumes:
  pg_data:

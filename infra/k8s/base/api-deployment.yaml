apiVersion: apps/v1
kind: Deployment
metadata:
  name: zunftgewerk-api
  namespace: zunftgewerk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zunftgewerk-api
  template:
    metadata:
      labels:
        app: zunftgewerk-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: api
          image: ghcr.io/paramdnoid/zunftgewerk-api:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          envFrom:
            - secretRef:
                name: zunftgewerk-secrets
          env:
            - name: JWT_ISSUER
              value: zunftgewerk-prod
            - name: SPRING_PROFILES_ACTIVE
              value: prod
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

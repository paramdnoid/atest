# TEMPLATE — do NOT commit with real values
# Create the secret manually in your cluster:
#
#   kubectl apply -f secrets-template.yaml
#
# Or use Sealed Secrets / External Secrets Operator for production.
#
# Required secrets for zunftgewerk-secrets:
#   database-url          jdbc:postgresql://postgres:5432/zunftgewerk
#   database-username     zunftgewerk
#   database-password     <strong-password>
#   jwt-private-key-pem   <RS256 PEM, base64-encoded>
#   jwt-public-key-pem    <RS256 PEM, base64-encoded>
#   stripe-secret-key     sk_live_...
#   stripe-webhook-secret whsec_...
#   mfa-encryption-key    <32 random chars>
#   redis-host            redis
#   redis-port            6379
#
# Generate RS256 key pair:
#   openssl genrsa -out private.pem 2048
#   openssl rsa -in private.pem -pubout -out public.pem
#   cat private.pem | base64 -w0   # → jwt-private-key-pem value
#   cat public.pem  | base64 -w0   # → jwt-public-key-pem value
#
# Generate MFA key (AES-128: needs 16 chars / 32 hex chars):
#   openssl rand -hex 16

apiVersion: v1
kind: Secret
metadata:
  name: zunftgewerk-secrets
  namespace: zunftgewerk
type: Opaque
stringData:
  database-url: "jdbc:postgresql://postgres:5432/zunftgewerk"
  database-username: "REPLACE_ME"
  database-password: "REPLACE_ME"
  jwt-private-key-pem: "REPLACE_ME"
  jwt-public-key-pem: "REPLACE_ME"
  stripe-secret-key: "REPLACE_ME"
  stripe-webhook-secret: "REPLACE_ME"
  mfa-encryption-key: "REPLACE_ME"
  redis-host: "redis"
  redis-port: "6379"

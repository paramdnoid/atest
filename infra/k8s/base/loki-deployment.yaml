apiVersion: apps/v1
kind: Deployment
metadata:
  name: zunftgewerk-loki
  namespace: zunftgewerk
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zunftgewerk-loki
  template:
    metadata:
      labels:
        app: zunftgewerk-loki
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:3.4.2
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
            - name: grpc
              containerPort: 9096
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: loki-config
          configMap:
            name: zunftgewerk-loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: zunftgewerk-loki-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zunftgewerk-loki-pvc
  namespace: zunftgewerk
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

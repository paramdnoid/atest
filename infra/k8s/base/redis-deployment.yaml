apiVersion: apps/v1
kind: Deployment
metadata:
  name: zunftgewerk-redis
  namespace: zunftgewerk
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zunftgewerk-redis
  template:
    metadata:
      labels:
        app: zunftgewerk-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zunftgewerk-landing
  namespace: zunftgewerk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zunftgewerk-landing
  template:
    metadata:
      labels:
        app: zunftgewerk-landing
    spec:
      containers:
        - name: landing
          image: ghcr.io/zunftgewerk/zunftgewerk-landing:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: zunftgewerk-config
                  key: api-url
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30

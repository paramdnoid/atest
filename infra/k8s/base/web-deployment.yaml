apiVersion: apps/v1
kind: Deployment
metadata:
  name: zunftgewerk-web
  namespace: zunftgewerk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zunftgewerk-web
  template:
    metadata:
      labels:
        app: zunftgewerk-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          image: ghcr.io/paramdnoid/zunftgewerk-web:latest
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: zunftgewerk-config
                  key: api-url
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /signin
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /signin
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zunftgewerk-postgres
  namespace: zunftgewerk
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: zunftgewerk-postgres
  template:
    metadata:
      labels:
        app: zunftgewerk-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: zunftgewerk
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zunftgewerk-secrets
                  key: DATABASE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zunftgewerk-secrets
                  key: DATABASE_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "zunftgewerk"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "zunftgewerk"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: zunftgewerk-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zunftgewerk-postgres-pvc
  namespace: zunftgewerk
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

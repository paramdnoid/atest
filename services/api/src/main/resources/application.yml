spring:
  application:
    name: zunftgewerk-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/zunftgewerk}
    username: ${DATABASE_USERNAME:zunftgewerk}
    password: ${DATABASE_PASSWORD:zunftgewerk}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

grpc:
  server:
    port: ${GRPC_PORT:9090}

zunftgewerk:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  email:
    from: ${MAIL_FROM:${EMAIL_FROM:noreply@localhost}}
    from-name: ${EMAIL_FROM_NAME:ZunftGewerk}
    landing-base-url: ${LANDING_BASE_URL:http://localhost:3000}
    api-base-url: ${API_BASE_URL:http://localhost:8080}
  email-verification:
    ttl-seconds: ${EMAIL_VERIFICATION_TTL_SECONDS:86400}
  password-reset:
    ttl-seconds: ${PASSWORD_RESET_TTL_SECONDS:3600}
  auth:
    cookie:
      same-site: ${AUTH_COOKIE_SAMESITE:Lax}
      secure: ${AUTH_COOKIE_SECURE:}
      domain: ${AUTH_COOKIE_DOMAIN:}
      path: ${AUTH_COOKIE_PATH:/}
      max-age-seconds: ${AUTH_COOKIE_MAX_AGE_SECONDS:${JWT_REFRESH_TTL_SECONDS:2592000}}
    rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      login-limit: ${AUTH_RATE_LIMIT_LOGIN_LIMIT:5}
      login-window-seconds: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
      passkey-limit: ${AUTH_RATE_LIMIT_PASSKEY_LIMIT:10}
      passkey-window-seconds: ${AUTH_RATE_LIMIT_PASSKEY_WINDOW_SECONDS:60}
      mfa-limit: ${AUTH_RATE_LIMIT_MFA_LIMIT:10}
      mfa-window-seconds: ${AUTH_RATE_LIMIT_MFA_WINDOW_SECONDS:300}
      refresh-limit: ${AUTH_RATE_LIMIT_REFRESH_LIMIT:30}
      refresh-window-seconds: ${AUTH_RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}
  security:
    jwt-issuer: ${JWT_ISSUER:zunftgewerk-local}
    jwt-audience: ${JWT_AUDIENCE:zunftgewerk-clients}
    jwt-kid: ${JWT_KID:dev-key-1}
    jwt-access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    jwt-refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:2592000}
    jwt-private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
    jwt-public-key-pem: ${JWT_PUBLIC_KEY_PEM:}
    mfa-encryption-key: ${MFA_ENCRYPTION_KEY:dev-dev-dev-dev-dev-dev-dev-dev}
  passkey:
    rp-id: ${PASSKEY_RP_ID:localhost}
    rp-name: ${PASSKEY_RP_NAME:Zunftgewerk}
    origin: ${PASSKEY_ORIGIN:http://localhost:3001}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    retries:
      worker-enabled: ${STRIPE_RETRY_WORKER_ENABLED:true}
      scan-interval-seconds: ${STRIPE_RETRY_SCAN_INTERVAL_SECONDS:30}
      batch-size: ${STRIPE_RETRY_BATCH_SIZE:50}
      max-attempts: ${STRIPE_RETRY_MAX_ATTEMPTS:5}
      base-delay-seconds: ${STRIPE_RETRY_BASE_DELAY_SECONDS:30}
      max-delay-seconds: ${STRIPE_RETRY_MAX_DELAY_SECONDS:3600}
    ingest:
      worker-enabled: ${STRIPE_INGEST_WORKER_ENABLED:true}
      scan-interval-seconds: ${STRIPE_INGEST_SCAN_INTERVAL_SECONDS:5}
      batch-size: ${STRIPE_INGEST_BATCH_SIZE:50}
    dead-letter:
      recovery-enabled: ${STRIPE_DEAD_LETTER_RECOVERY_ENABLED:true}
      recovery-interval-seconds: ${STRIPE_DEAD_LETTER_RECOVERY_INTERVAL_SECONDS:300}
      cooldown-seconds: ${STRIPE_DEAD_LETTER_COOLDOWN_SECONDS:3600}
      max-recovery-attempts: ${STRIPE_DEAD_LETTER_MAX_RECOVERY_ATTEMPTS:3}
    ops:
      recovery-token: ${STRIPE_OPS_RECOVERY_TOKEN:}
